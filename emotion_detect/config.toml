device = "cuda" # cuda or cpu

[model]
num_class = 7
num_stage = 2
num_res = 2
dropout = 0.3

[data]
path = "archive"
batch_size = 128
num_workers = 6

[train]
epochs = 100
lr = 1e-4
max_lr = 1e-3
weight_decay = 1e-4
label_smoothing = 0.1 # 0.0 ~ 1.0

[train.early_stop]
enable = true
patience = 7
min_delta = 1e-3