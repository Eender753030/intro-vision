[workspace]
authors = ["Eender753030 <ender303030@gmail.com>"]
channels = ["pytorch", "nvidia", "conda-forge", "pypi"]
name = "intro-vision"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
train = "python src/main.py"
test = "python src/main.py --test"

[dependencies]
python = "3.11.*"
pytorch = ">=2.5.1,<3"
torchvision = ">=0.20.1,<0.21"
torchinfo = ">=1.8.0,<2"
termcolor = ">=3.3.0,<4"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.9.1,<4"
numpy = ">=2.4.3,<3"
tqdm = ">=4.67.3,<5"
prettytable = ">=3.17.0,<4"
