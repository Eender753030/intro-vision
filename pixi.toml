[workspace]
authors = ["Eender753030 <ender303030@gmail.com>"]
channels = ["pytorch", "nvidia", "conda-forge", "pypi"]
name = "intro-vision"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
emo_train = "python emotion_detect/src/main.py"
emo_test = "python emotion_detect/src/main.py --test"
emo_infer = "python emotion_detect/src/main.py --infer" # Need argument of input image path
onnx_export = "python script/export_onnx.py"
onnx_test = "python script/test_onnx.py"
espdl_export = "python script/export_espdl.py"
sim = "python -m onnxsim model/model.onnx model/model_simplified.onnx"

[dependencies]
python = "3.11.*"
pytorch = ">=2.5.1,<3"
torchvision = ">=0.20.1,<0.21"
torchinfo = ">=1.8.0,<2"
termcolor = ">=3.3.0,<4"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.9.1,<4"
numpy = ">=2.4.3,<3"
tqdm = ">=4.67.3,<5"
prettytable = ">=3.17.0,<4"
onnxscript = ">=0.5.6,<0.6"
onnxruntime = ">=1.24.2,<2"

[pypi-dependencies]
onnxsim = "==0.4.36"
esp-ppq = ">=1.2.10, <2"
