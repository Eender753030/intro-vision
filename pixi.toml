[workspace]
authors = ["Eender753030 <ender303030@gmail.com>"]
channels = ["pytorch", "nvidia", "conda-forge", "pypi"]
name = "intro-vision"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
esp_init = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py set-target esp32s3'"
esp_clean = "rm -rf $PIXI_PROJECT_ROOT/firmware/build $PIXI_PROJECT_ROOT/firmware/sdkconfig"
esp_build = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py build'"
esp_flash = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py flash'"
esp_flash_m = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py flash monitor'"
esp_monitor = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py monitor'"
esp_menuconfig = "bash -c '. $IDF_PATH/export.sh && cd $PIXI_PROJECT_ROOT/firmware && idf.py menuconfig'"

[dependencies]
python = "3.11.*"
pytorch = ">=2.5.1,<3"
torchvision = ">=0.20.1,<0.21"
torchinfo = ">=1.8.0,<2"
termcolor = ">=3.3.0,<4"
pandas = ">=2.3.3,<3"
matplotlib = ">=3.9.1,<4"
numpy = ">=2.4.3,<3"
tqdm = ">=4.67.3,<5"
prettytable = ">=3.17.0,<4"
onnxscript = ">=0.5.6,<0.6"
onnxruntime = ">=1.24.2,<2"

[pypi-dependencies]
onnxsim = "==0.4.36"
esp-ppq = ">=1.2.10, <2"

[activation]
env = { IDF_PATH = "/home/eender/.espressif/v5.4.4/esp-idf", IDF_EXTRA_ACTIONS_PATH = "$PIXI_PROJECT_ROOT/firmware/components/esp-who/tools" }
